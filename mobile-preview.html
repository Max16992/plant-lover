<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile Vorschau - BlackDiamonds Jungle</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      place-items: center;
      background: #101510;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .phone {
      width: min(390px, calc(100vw - 24px));
      height: min(844px, calc(100vh - 48px));
      overflow: hidden;
      border: 10px solid #202420;
      border-radius: 34px;
      background: #061006;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.62);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #061006;
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Mobile Vorschau">
    <iframe src="/" title="BlackDiamonds Jungle Mobile Vorschau"></iframe>
  </main>
</body>
</html>
