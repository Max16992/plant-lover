<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Collection – Plant Lover</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f7eed3;
      --muted: #d9caa1;
      --gold: #cdb77a;
      --gold-bright: #ead59a;
      --panel: rgba(5, 17, 9, 0.82);
      --line: rgba(205, 183, 122, 0.72);
      --shadow: 0 26px 70px rgba(0,0,0,0.46);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
      background: #061006;
      overflow-x: hidden;
    }

    body::before {
      position: fixed; inset: 0; z-index: -3; content: "";
      background-image: url("assets/plant-background-desktop.png");
      background-repeat: no-repeat;
      background-position: top center;
      background-size: cover;
      filter: saturate(1.06) contrast(1.04);
    }

    body::after {
      position: fixed; inset: 0; z-index: -2; content: "";
      background: linear-gradient(180deg, rgba(6,16,6,0.55) 0%, rgba(6,16,6,0.78) 60%, rgba(6,16,6,0.96) 100%);
    }

    .site {
      width: min(100%, 1100px);
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 0 32px;
      gap: 6px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.8;
      margin-bottom: 16px;
      transition: opacity 0.2s;
      align-self: flex-start;
    }
    .back:hover { opacity: 1; }

    .page-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
    }

    .page-title {
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.6rem, 9vw, 4.5rem);
      color: var(--gold-bright);
      line-height: 1.1;
    }

    .page-sub {
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.7;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .divider {
      width: 50px; height: 1px;
      background: var(--line);
      margin: 12px auto 0;
    }

    /* ── Grid – 50% kleiner = 6 Spalten ── */
    .collection-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 28px;
    }

    .plant-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: zoom-in;
    }

    .plant-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .plant-photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
    }

    .plant-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .plant-card:hover .plant-photo {
      transform: scale(1.05);
    }

    .plant-zoom-hint {
      position: absolute;
      bottom: 6px; right: 6px;
      background: rgba(5,17,9,0.78);
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .plant-card:hover .plant-zoom-hint { opacity: 1; }
    .plant-zoom-hint svg { width: 11px; height: 11px; color: var(--gold); }

    .plant-photo-placeholder {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: rgba(24, 48, 28, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--gold);
      opacity: 0.35;
    }

    .plant-photo-placeholder svg { width: 28px; height: 28px; }
    .plant-photo-placeholder span {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .plant-info {
      padding: 8px 10px 10px;
    }

    .plant-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--gold-bright);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plant-from {
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.65;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plant-from svg { width: 9px; height: 9px; flex-shrink: 0; }

    /* ── Leer-Zustand ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      opacity: 0.5;
    }

    .empty-state svg { width: 48px; height: 48px; color: var(--gold); margin-bottom: 14px; }
    .empty-state p { font-size: 0.88rem; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, backdrop-filter 0.28s ease, background 0.28s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
    }

    .lightbox-inner {
      position: relative;
      max-width: min(88vw, 520px);
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(0.86);
      transition: transform 0.28s ease;
    }

    .lightbox.open .lightbox-inner { transform: scale(1); }

    .lightbox-img {
      max-width: 100%;
      max-height: 68vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
      border: 1px solid var(--line);
    }

    .lightbox-caption {
      margin-top: 14px;
      text-align: center;
    }

    .lightbox-caption .lb-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gold-bright);
      margin-bottom: 5px;
    }

    .lightbox-caption .lb-from {
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.75;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .lightbox-caption .lb-from svg { width: 11px; height: 11px; }

    .lightbox-caption .lb-note {
      margin-top: 6px;
      font-size: 0.74rem;
      color: var(--muted);
      opacity: 0.55;
      font-style: italic;
    }

    .lightbox-close {
      position: absolute;
      top: -13px; right: -13px;
      width: 32px; height: 32px;
      background: rgba(5,17,9,0.92);
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-close:hover { background: rgba(24,48,28,0.95); }
    .lightbox-close svg { width: 14px; height: 14px; }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 50px;
      color: #f1dca9;
      font-weight: 600;
      font-size: 0.82rem;
      text-shadow: 0 2px 14px rgba(0,0,0,0.6);
    }

    footer svg { width: 18px; height: 18px; color: var(--gold); }

    @media (max-width: 900px) {
      .collection-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    }

    @media (max-width: 560px) {
      .collection-grid { grid-template-columns: repeat(3, 1fr); gap: 7px; }
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="page-header">
      <a class="back" href="/">
        <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Plant Lover
      </a>
      <p class="page-eyebrow">Plant Lover</p>
      <h1 class="page-title">My Collection</h1>
      <p class="page-sub">Meine Pflanzen – aus den besten Shops</p>
      <div class="divider"></div>
    </div>

    <div class="collection-grid" id="grid">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 21V9M12 13c-4.5 0-7-2.8-7-7 4.5 0 7 2.8 7 7Zm0 3c4.5 0 7-2.8 7-7-4.5 0-7 2.8-7 7Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <p>Noch keine Pflanzen – füge welche im Collection Editor hinzu.</p>
      </div>
    </div>

    <footer>
      <span>Plant Lover – Bring Nature Home</span>
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 21V9M12 13c-4.5 0-7-2.8-7-7 4.5 0 7 2.8 7 7Zm0 3c4.5 0 7-2.8 7-7-4.5 0-7 2.8-7 7Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </footer>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightboxClose">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const lightboxClose = document.getElementById("lightboxClose");

    const shopIcon = `<svg viewBox="0 0 24 24" fill="none" width="11" height="11"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>`;
    const zoomIcon = `<svg viewBox="0 0 24 24" fill="none"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const leafIcon = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 21V9M12 13c-4.5 0-7-2.8-7-7 4.5 0 7 2.8 7 7Zm0 3c4.5 0 7-2.8 7-7-4.5 0-7 2.8-7 7Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    function buildCard(plant) {
      const card = document.createElement("div");
      card.className = "plant-card";
      card.dataset.name = plant.name || "";
      card.dataset.from = plant.from || "";
      card.dataset.note = plant.note || "";
      card.dataset.photo = plant.photo || "";

      const photoHtml = plant.photo
        ? `<div class="plant-photo-wrap">
             <img class="plant-photo" src="${plant.photo}" alt="${plant.name}" loading="lazy">
             <div class="plant-zoom-hint">${zoomIcon}</div>
           </div>`
        : `<div class="plant-photo-placeholder">${leafIcon}<span>Foto kommt</span></div>`;

      card.innerHTML = `
        ${photoHtml}
        <div class="plant-info">
          <p class="plant-name">${plant.name || "–"}</p>
          <p class="plant-from">${shopIcon} von ${plant.from || "–"}</p>
        </div>`;

      card.addEventListener("click", () => openLightbox(card, plant));
      return card;
    }

    function openLightbox(card, plant) {
      if (!plant.photo) return;
      lightboxImg.src = plant.photo;
      lightboxImg.alt = plant.name || "";
      lightboxCaption.innerHTML = `
        <p class="lb-name">${plant.name || ""}</p>
        ${plant.from ? `<p class="lb-from">${shopIcon} von ${plant.from}</p>` : ""}
        ${plant.note ? `<p class="lb-note">${plant.note}</p>` : ""}`;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    }

    lightboxClose.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

    fetch("/plants.json?t=" + Date.now())
      .then(r => r.json())
      .then(data => {
        const plants = data.plants || [];
        if (!plants.length) return;
        grid.innerHTML = "";
        plants.forEach(p => grid.appendChild(buildCard(p)));
      })
      .catch(() => {});
  </script>
</body>
</html>
