<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop Editor - BlackDiamonds Jungle</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f8ecd0;
      --muted: #d7c89d;
      --gold: #cdb77a;
      --panel: rgba(5, 17, 9, 0.86);
      --line: rgba(205, 183, 122, 0.56);
      --leaf: #0a1d0d;
      --button: #47673b;
      --danger: #8e2f38;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
      background:
        linear-gradient(rgba(2, 9, 4, 0.74), rgba(2, 9, 4, 0.88)),
        url("assets/plant-background-desktop.png") center / cover fixed;
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      display: flex;
      gap: 18px;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 0.95;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: end;
    }

    button,
    .link-button {
      display: inline-flex;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(205, 183, 122, 0.4);
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      background: rgba(71, 103, 59, 0.82);
      cursor: pointer;
      text-decoration: none;
    }

    button:hover,
    button:focus-visible,
    .link-button:hover,
    .link-button:focus-visible {
      border-color: var(--gold);
      outline: none;
      background: rgba(82, 120, 66, 0.92);
    }

    .danger {
      background: rgba(142, 47, 56, 0.86);
    }

    .status {
      min-height: 28px;
      margin: 0 0 14px;
      color: #f4dfb4;
      font-weight: 700;
    }

    .shop-list {
      display: grid;
      gap: 12px;
    }

    .shop-editor {
      display: grid;
      grid-template-columns: 42px 150px minmax(0, 1fr) 118px;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(8px);
    }

    .shop-editor.dragging {
      opacity: 0.55;
    }

    .drag-handle {
      display: grid;
      min-height: 118px;
      border: 1px dashed rgba(205, 183, 122, 0.45);
      border-radius: 8px;
      place-items: center;
      color: var(--gold);
      font-weight: 800;
      cursor: grab;
      user-select: none;
    }

    .position-input {
      width: 100%;
      max-width: 54px;
      padding: 8px 4px;
      border-color: rgba(205, 183, 122, 0.5);
      color: var(--gold);
      font-weight: 900;
      text-align: center;
      background: rgba(4, 13, 6, 0.5);
    }

    .position-input:focus {
      border-color: var(--gold);
      outline: none;
      background: rgba(10, 28, 12, 0.82);
    }

    .logo-tools {
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .logo-preview {
      display: grid;
      width: 118px;
      height: 118px;
      overflow: hidden;
      border: 1px solid var(--gold);
      border-radius: 999px;
      place-items: center;
      color: var(--gold);
      background:
        radial-gradient(circle at 50% 36%, rgba(205, 183, 122, 0.14), transparent 54%),
        rgba(11, 36, 16, 0.86);
      font-family: Georgia, serif;
      font-size: 1.6rem;
      font-weight: 800;
    }

    .logo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translate(var(--logo-x, 0%), var(--logo-y, 0%)) scale(var(--logo-scale, 1));
      transform-origin: center;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(205, 183, 122, 0.34);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      font: inherit;
      background: rgba(4, 13, 6, 0.78);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input[type="file"] {
      padding: 8px;
      font-size: 0.76rem;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--gold);
      touch-action: none;
      cursor: ew-resize;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .range-value {
      min-width: 42px;
      color: var(--ink);
      font-size: 0.74rem;
      font-weight: 800;
      text-align: right;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 10px;
    }

    .fields label {
      grid-column: 1 / -1;
    }

    .fields label:nth-child(2),
    .fields label:nth-child(3) {
      grid-column: span 1;
    }

    .item-actions {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .save-feedback {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 36px));
      padding: 14px 16px;
      border: 1px solid rgba(205, 183, 122, 0.65);
      border-radius: 8px;
      color: var(--ink);
      font-weight: 800;
      background: rgba(13, 45, 18, 0.94);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }

    .save-feedback.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .save-feedback.is-error {
      background: rgba(98, 29, 37, 0.96);
    }

    @media (max-width: 820px) {
      header {
        display: grid;
      }

      .toolbar {
        justify-content: start;
      }

      .shop-editor {
        grid-template-columns: 34px 120px minmax(0, 1fr);
      }

      .item-actions {
        grid-column: 1 / -1;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 18px, 430px);
        padding-top: 18px;
      }

      .shop-editor {
        grid-template-columns: 30px minmax(0, 1fr);
      }

      .logo-tools {
        grid-column: 2;
        grid-template-columns: 96px minmax(0, 1fr);
        align-items: center;
      }

      .logo-preview {
        width: 96px;
        height: 96px;
      }

      .fields {
        grid-column: 1 / -1;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>Shop Editor</h1>
        <p class="subtitle">Reihenfolge, Shops und runde Logos bearbeiten.</p>
      </div>
      <nav class="toolbar" aria-label="Editor Aktionen">
        <button type="button" data-add>Neuer Shop</button>
        <button type="button" data-save>Speichern</button>
        <a class="link-button" href="/" target="_blank" rel="noopener noreferrer">Vorschau</a>
        <a class="link-button" href="/mobile-preview.html" target="_blank" rel="noopener noreferrer">Handy</a>
      </nav>
    </header>

    <p class="status" data-status>Shop-Daten werden geladen...</p>
    <main class="shop-list" data-list></main>
  </div>
  <div class="save-feedback" data-feedback role="status" aria-live="polite"></div>

  <script>
    const list = document.querySelector("[data-list]");
    const statusLine = document.querySelector("[data-status]");
    const feedback = document.querySelector("[data-feedback]");
    const addButton = document.querySelector("[data-add]");
    const saveButton = document.querySelector("[data-save]");
    let shops = [];
    let draggedId = "";
    let feedbackTimeout = 0;

    function setStatus(message) {
      statusLine.textContent = message;
    }

    function showFeedback(message, isError = false) {
      clearTimeout(feedbackTimeout);
      feedback.textContent = message;
      feedback.classList.toggle("is-error", isError);
      feedback.classList.add("is-visible");
      feedbackTimeout = window.setTimeout(() => {
        feedback.classList.remove("is-visible");
      }, 3200);
    }

    function slugify(value) {
      return String(value || "shop")
        .toLowerCase()
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 60) || "shop";
    }

    function uniqueId(name) {
      const base = slugify(name);
      let id = base;
      let counter = 2;

      while (shops.some((shop) => shop.id === id)) {
        id = `${base}-${counter}`;
        counter += 1;
      }

      return id;
    }

    function getShop(id) {
      return shops.find((shop) => shop.id === id);
    }

    function normalizeShop(shop) {
      shop.id ||= uniqueId(shop.name || "shop");
      shop.initials ||= (shop.name || "Shop").slice(0, 2).toUpperCase();
      shop.ctaLabel ||= "Zum Shop";
      shop.logoImage ||= "";
      shop.logoScale = Number(shop.logoScale) || 1;
      shop.logoX = Number(shop.logoX) || 0;
      shop.logoY = Number(shop.logoY) || 0;
      return shop;
    }

    function moveShop(id, direction) {
      const index = shops.findIndex((shop) => shop.id === id);
      const nextIndex = index + direction;
      if (index < 0 || nextIndex < 0 || nextIndex >= shops.length) return;

      const [shop] = shops.splice(index, 1);
      shops.splice(nextIndex, 0, shop);
      render();
      setStatus(`${shop.name} verschoben. Danach speichern.`);
    }

    function moveShopToPosition(id, position) {
      const index = shops.findIndex((shop) => shop.id === id);
      const targetIndex = Math.min(Math.max(Number(position) - 1, 0), shops.length - 1);

      if (index < 0 || !Number.isFinite(targetIndex)) {
        render();
        return;
      }

      if (targetIndex === index) {
        render();
        return;
      }

      const [shop] = shops.splice(index, 1);
      shops.splice(targetIndex, 0, shop);
      render();
      setStatus(`${shop.name} auf Position ${targetIndex + 1} verschoben. Danach speichern.`);
    }

    function removeShop(id) {
      const shop = getShop(id);
      if (!shop) return;
      if (!confirm(`${shop.name} wirklich entfernen?`)) return;

      shops = shops.filter((item) => item.id !== id);
      render();
      setStatus(`${shop.name} entfernt. Danach speichern.`);
    }

    function createLogoPreview(shop) {
      const preview = document.createElement("div");
      preview.className = "logo-preview";
      preview.style.setProperty("--logo-scale", String(shop.logoScale || 1));
      preview.style.setProperty("--logo-x", `${shop.logoX || 0}%`);
      preview.style.setProperty("--logo-y", `${shop.logoY || 0}%`);

      if (shop.logoImage) {
        const image = document.createElement("img");
        image.src = shop.logoImage;
        image.alt = "";
        preview.append(image);
      } else {
        preview.textContent = shop.initials || "PL";
      }

      return preview;
    }

    function createInput(shop, field, labelText, options = {}) {
      const label = document.createElement("label");
      const input = options.textarea ? document.createElement("textarea") : document.createElement("input");

      label.textContent = labelText;
      input.value = shop[field] || "";
      input.dataset.field = field;
      if (options.placeholder) input.placeholder = options.placeholder;

      input.addEventListener("input", () => {
        shop[field] = input.value;
        if (field === "name" && !shop.id) shop.id = uniqueId(input.value);
        if (field === "initials") renderLogoOnly(shop.id);
      });

      label.append(input);
      return label;
    }

    function createRangeControl(shop, field, labelText, min, max, step, suffix = "") {
      const label = document.createElement("label");
      const row = document.createElement("span");
      const input = document.createElement("input");
      const value = document.createElement("span");

      label.textContent = labelText;
      row.className = "range-row";
      input.type = "range";
      input.min = String(min);
      input.max = String(max);
      input.step = String(step);
      input.value = String(shop[field] ?? (field === "logoScale" ? 1 : 0));
      value.className = "range-value";

      function updateValue() {
        const numericValue = Number(input.value);
        shop[field] = numericValue;
        value.textContent = field === "logoScale"
          ? `${numericValue.toFixed(2)}x`
          : `${numericValue}${suffix}`;

        const preview = label.closest(".shop-editor")?.querySelector(".logo-preview");
        if (preview) {
          preview.style.setProperty("--logo-scale", String(shop.logoScale || 1));
          preview.style.setProperty("--logo-x", `${shop.logoX || 0}%`);
          preview.style.setProperty("--logo-y", `${shop.logoY || 0}%`);
        }
      }

      input.addEventListener("pointerdown", (event) => event.stopPropagation());
      input.addEventListener("touchmove", (event) => event.stopPropagation(), { passive: true });
      input.addEventListener("input", updateValue);
      updateValue();

      row.append(input, value);
      label.append(row);
      return label;
    }

    function renderLogoOnly(id) {
      const shop = getShop(id);
      const item = list.querySelector(`[data-id="${id}"]`);
      if (!shop || !item) return;

      const oldPreview = item.querySelector(".logo-preview");
      oldPreview.replaceWith(createLogoPreview(shop));
    }

    async function uploadLogo(shop, file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const response = await fetch("/api/shop-logo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          shopName: shop.name,
          fileName: file.name,
          dataUrl,
        }),
      });
      const result = await response.json();
      if (!result.ok) throw new Error(result.error || "Logo konnte nicht gespeichert werden.");

      shop.logoImage = result.path;
      render();
      setStatus(`Logo fuer ${shop.name} gespeichert. Danach Shop-Liste speichern.`);
    }

    function createEditorItem(shop, index) {
      const item = document.createElement("article");
      item.className = "shop-editor";
      item.dataset.id = shop.id;

      item.addEventListener("dragover", (event) => event.preventDefault());
      item.addEventListener("drop", (event) => {
        event.preventDefault();
        if (!draggedId || draggedId === shop.id) return;

        const draggedIndex = shops.findIndex((entry) => entry.id === draggedId);
        const targetIndex = shops.findIndex((entry) => entry.id === shop.id);
        const [dragged] = shops.splice(draggedIndex, 1);
        shops.splice(targetIndex, 0, dragged);
        render();
        setStatus("Reihenfolge geaendert. Danach speichern.");
      });

      const drag = document.createElement("div");
      drag.className = "drag-handle";
      drag.draggable = true;

      const positionInput = document.createElement("input");
      positionInput.className = "position-input";
      positionInput.type = "number";
      positionInput.min = "1";
      positionInput.max = String(shops.length);
      positionInput.value = String(index + 1);
      positionInput.title = "Position eingeben";
      positionInput.setAttribute("aria-label", `Position von ${shop.name}`);
      let positionCommitted = false;
      function commitPositionChange() {
        if (positionCommitted) return;
        positionCommitted = true;
        moveShopToPosition(shop.id, positionInput.value);
      }

      positionInput.addEventListener("pointerdown", (event) => event.stopPropagation());
      positionInput.addEventListener("click", (event) => {
        event.stopPropagation();
        positionInput.select();
      });
      positionInput.addEventListener("keydown", (event) => {
        event.stopPropagation();
        if (event.key === "Enter") {
          event.preventDefault();
          commitPositionChange();
        }
      });
      positionInput.addEventListener("change", commitPositionChange);
      positionInput.addEventListener("blur", commitPositionChange);

      drag.append(positionInput);
      drag.addEventListener("dragstart", () => {
        draggedId = shop.id;
        item.classList.add("dragging");
      });
      drag.addEventListener("dragend", () => {
        draggedId = "";
        item.classList.remove("dragging");
      });

      const logoTools = document.createElement("section");
      logoTools.className = "logo-tools";
      const logoPreview = createLogoPreview(shop);

      const fileLabel = document.createElement("label");
      fileLabel.textContent = "Logo-Bild";
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = "image/png,image/jpeg,image/webp,image/svg+xml";
      fileInput.addEventListener("change", async () => {
        const file = fileInput.files?.[0];
        if (!file) return;

        try {
          setStatus(`Logo fuer ${shop.name} wird gespeichert...`);
          await uploadLogo(shop, file);
        } catch (error) {
          setStatus(error.message);
        }
      });
      fileLabel.append(fileInput);

      const scaleLabel = createRangeControl(shop, "logoScale", "Bild skalieren", 0.6, 2.4, 0.01);
      const xLabel = createRangeControl(shop, "logoX", "Horizontal bewegen", -45, 45, 1, "%");
      const yLabel = createRangeControl(shop, "logoY", "Vertikal bewegen", -45, 45, 1, "%");

      const removeLogo = document.createElement("button");
      removeLogo.type = "button";
      removeLogo.textContent = "Bild entfernen";
      removeLogo.addEventListener("click", () => {
        shop.logoImage = "";
        shop.logoScale = 1;
        shop.logoX = 0;
        shop.logoY = 0;
        render();
        setStatus(`Logo fuer ${shop.name} entfernt. Danach speichern.`);
      });

      logoTools.append(logoPreview, fileLabel, scaleLabel, xLabel, yLabel, removeLogo);

      const fields = document.createElement("section");
      fields.className = "fields";
      fields.append(
        createInput(shop, "name", "Shop-Name"),
        createInput(shop, "initials", "Initialen"),
        createInput(shop, "ctaLabel", "Button-Text", { placeholder: "Zum Shop" }),
        createInput(shop, "url", "Link"),
        createInput(shop, "tags", "Tags"),
        createInput(shop, "description", "Beschreibung", { textarea: true })
      );

      const actions = document.createElement("section");
      actions.className = "item-actions";
      const up = document.createElement("button");
      up.type = "button";
      up.textContent = "Hoch";
      up.addEventListener("click", () => moveShop(shop.id, -1));
      const down = document.createElement("button");
      down.type = "button";
      down.textContent = "Runter";
      down.addEventListener("click", () => moveShop(shop.id, 1));
      const remove = document.createElement("button");
      remove.type = "button";
      remove.className = "danger";
      remove.textContent = "Loeschen";
      remove.addEventListener("click", () => removeShop(shop.id));
      actions.append(up, down, remove);

      item.append(drag, logoTools, fields, actions);
      return item;
    }

    function render() {
      list.replaceChildren(...shops.map(createEditorItem));
    }

    async function loadShops() {
      if (location.protocol === "file:") {
        setStatus("Bitte den Editor nicht direkt aus dem Ordner oeffnen. Nutze shop-editor-starten.bat, damit Shops geladen und gespeichert werden koennen.");
        return;
      }

      try {
        const response = await fetch("shops.json", { cache: "no-store" });
        shops = (await response.json()).map(normalizeShop);
        render();
        setStatus(`${shops.length} Shops geladen.`);
      } catch (error) {
        setStatus("Shop-Daten konnten nicht geladen werden.");
      }
    }

    async function saveShops() {
      try {
        setStatus("Speichern...");
        const response = await fetch("/api/shops", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(shops),
        });
        const result = await response.json();
        if (!result.ok) throw new Error(result.error || "Speichern fehlgeschlagen.");
        setStatus(`${result.count} Shops gespeichert. Vorschau neu laden.`);
        showFeedback(`${result.count} Shops gespeichert.`);
      } catch (error) {
        setStatus(`${error.message} Nutze die lokale Vorschau mit start-vorschau.bat.`);
        showFeedback(error.message, true);
      }
    }

    addButton.addEventListener("click", () => {
      const shop = {
        id: uniqueId("neuer-shop"),
        name: "Neuer Shop",
        url: "https://",
        initials: "NS",
        ctaLabel: "Zum Shop",
        tags: "Plants \u2022 Shop",
        description: "Kurze Beschreibung fuer diesen Shop.",
        logoImage: "",
        logoScale: 1,
        logoX: 0,
        logoY: 0,
      };

      shops.unshift(shop);
      render();
      setStatus("Neuer Shop hinzugefuegt. Danach ausfuellen und speichern.");
    });

    saveButton.addEventListener("click", saveShops);
    loadShops();
  </script>
</body>
</html>
